  <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-2">Username</label>
  <div class="relative">
    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"><i class="fa fa-user"></i></span>
    <input placeholder="Masukkan username..." type="text" id="username" autocomplete="username" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm" required>
  </div>
</div>

<div class="mt-4">
  <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-2">Password</label>
  <div class="relative">

    <input placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;" type="password" id="password" autocomplete="current-password" class="w-full pl-10 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm" required>
    <!-- Tombol Mata Toggle -->
    <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-sky-600 transition-colors">
      <i id="eye-icon" class="fa fa-eye"></i>
    </button>
  </div>
</div>
        <button type="submit" class="w-full py-3.5 bg-brand-blue hover:bg-brand-blue/90 text-white font-bold rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">

<!-- OVERLAY LOADING UNIFIED (MURNI TAILWIND) -->
<div id="loading" class="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-md z-[99999] flex flex-col items-center justify-center hidden opacity-0 transition-opacity duration-300">
  <div class="bg-white/90 dark:bg-slate-900/90 p-8 rounded-[2.5rem] shadow-[0_20px_50px_-12px_rgba(0,0,0,0.2)] dark:shadow-[0_20px_50px_-12px_rgba(0,0,0,0.6)] flex flex-col items-center space-y-6 max-w-xs w-full mx-4 border border-white/20 dark:border-slate-800">
    <!-- Spinner Kustom dengan Efek Glow -->
    <div class="relative w-16 h-16">
      <div class="absolute inset-0 rounded-full border-4 border-slate-100 dark:border-slate-800"></div>
      <div class="absolute inset-0 rounded-full border-4 border-t-brand-blue border-r-brand-gold animate-spin shadow-[0_0_15px_rgba(2,132,199,0.3)]"></div>
    </div>
    <div class="space-y-3 text-center">
      <p id="loading-text" class="text-xs font-black text-slate-800 dark:text-slate-100 tracking-[0.2em] uppercase">Memproses</p>
      <!-- Loading Dots Animation -->
      <div class="flex justify-center gap-1.5">
        <div class="w-1.5 h-1.5 rounded-full bg-brand-blue animate-bounce [animation-delay:-0.3s]"></div>
        <div class="w-1.5 h-1.5 rounded-full bg-brand-gold animate-bounce [animation-delay:-0.15s]"></div>
        <div class="w-1.5 h-1.5 rounded-full bg-brand-blue animate-bounce"></div>
      </div>
    </div>
  </div>
