function normalizeArchiveText(value) {
  return String(value ?? "").replace(/\r\n/g, "\n").trim();
}

function normalizeArchiveDate(value) {
  const normalized = normalizeArchiveText(value);
  return normalized.includes("T") ? normalized.split("T")[0] : normalized;
}

function getCurrentDraftArchivePayload() {
  const getVal = (id, fallback = "") => document.getElementById(id)?.value ?? fallback;
  return {
    nomor: normalizeArchiveText(getVal('in_nomor')),
    tanggal: normalizeArchiveDate(getVal('in_tanggal')),
    perihal: normalizeArchiveText(getVal('in_perihal')),
    penerima: normalizeArchiveText(getVal('in_penerima')),
    lampiran: normalizeArchiveText(getVal('in_lampiran')),
    pembuka: normalizeArchiveText(getVal('in_pembuka')),
    isi: normalizeArchiveText(document.getElementById('in_isi')?.value || ""),
    tembusan: normalizeArchiveText(getVal('in_tembusan')),
    serial_id: normalizeArchiveText(getVal('in_serial_id')),
    layout: getVal('in_layout_type', 'standard')
  };
}

function normalizeArchivePayload(record = {}) {
  return {
    nomor: normalizeArchiveText(record.nomor),
    tanggal: normalizeArchiveDate(record.tanggal),
    perihal: normalizeArchiveText(record.perihal),
    penerima: normalizeArchiveText(record.penerima),
    lampiran: normalizeArchiveText(record.lampiran),
    pembuka: normalizeArchiveText(record.pembuka),
    isi: normalizeArchiveText(record.isi),
    tembusan: normalizeArchiveText(record.tembusan),
    serial_id: normalizeArchiveText(record.sid || record.serial_id),
    layout: record.layout || 'standard'
  };
}

function getArchiveSignature(payload) {
  return JSON.stringify(normalizeArchivePayload(payload));
}

function isCurrentDraftArchived() {
  const targetSignature = getArchiveSignature(getCurrentDraftArchivePayload());
  const arsip = Array.isArray(window.cacheArsip) ? window.cacheArsip : [];
  return arsip.some((row) => getArchiveSignature(row) === targetSignature);
}

function syncArchiveStatusUI() {
  const statusWrap = document.getElementById('print-archive-status');
  const statusIcon = document.getElementById('print-status-icon');
  const statusBadge = document.getElementById('print-status-badge');
  const statusText = document.getElementById('print-status-text');
  const printButton = document.getElementById('btn-cetak-surat');

  if (!statusWrap || !statusIcon || !statusBadge || !statusText || !printButton) {
    return;
  }

  const isArchived = isCurrentDraftArchived();

  if (isArchived) {
    statusWrap.className = 'mb-3 rounded-2xl border border-emerald-200 bg-emerald-50/90 p-3 shadow-sm dark:border-emerald-500/30 dark:bg-emerald-500/10';
    statusIcon.className = 'flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-emerald-100 text-emerald-700 dark:bg-emerald-500/20 dark:text-emerald-100';
    statusIcon.innerHTML = '<i class="fa-solid fa-circle-check text-sm"></i>';

    statusBadge.textContent = 'ARSIP TERSIMPAN';
    statusText.textContent = 'Surat sudah tercatat dan siap diverifikasi melalui scan.';
    printButton.disabled = false;
    printButton.classList.remove('opacity-50', 'cursor-not-allowed');
    printButton.classList.add('shadow-md');
    printButton.title = 'Cetak surat sekarang';
    printButton.setAttribute('aria-disabled', 'false');
  } else {
    statusWrap.className = 'mb-3 rounded-2xl border border-amber-200 bg-amber-50/90 p-3 shadow-sm dark:border-amber-500/30 dark:bg-amber-500/10';
    statusIcon.className = 'flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-amber-100 text-amber-700 dark:bg-amber-500/20 dark:text-amber-100';

  }

function handleLogin(e) {
  e.preventDefault();
  setLoading(true, "Memvalidasi Keamanan...");
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();

  google.script.run.withSuccessHandler(function(res) {
    setLoading(false);
    if(res && res.status === "SUCCESS") {
      const dataSesi = { terautentikasi: true, nama: res.nama, role: res.role, username: res.username };
      localStorage.setItem("kliksurat_sd_session", JSON.stringify(dataSesi));
      aktifkanSesiDashboard(res.nama, res.role, res.username);
      tampilkanToast("success", "AKSES DIBERIKAN", "Selamat datang kembali, " + res.nama);
    } else {
      tampilkanToast("error", "AKSES DITOLAK", res ? res.message : "Terjadi kesalahan sistem.");
    }
  }).withFailureHandler(function(err) {
    setLoading(false);
    tampilkanToast("error", "ERROR SERVER", err.toString());
  }).prosesLogin(u, p);
}

function aktifkanSesiDashboard(nama, role, username) {
  userSessionName = nama;
  userSessionUsername = username;
  const userProfile = document.getElementById('user-profile');
  if (userProfile) userProfile.innerHTML = `<i class="fa fa-user-circle"></i> ${nama}`;
  
  // ROLE BASED ACCESS CONTROL (RBAC)
  const isGuru = (role === "Guru");
  const btnSettings = document.getElementById('btn-open-settings');
  const tabKop = document.getElementById('btn-tab-kop');
  const tabTtd = document.getElementById('btn-tab-ttd');
  const tabContainer = document.getElementById('sidebar-tabs');

  if (btnSettings) btnSettings.classList.toggle('hidden', isGuru);
  if (tabKop) tabKop.classList.toggle('hidden', isGuru);
  if (tabTtd) tabTtd.classList.toggle('hidden', isGuru);

  // Menyesuaikan tampilan grid tab agar proporsional
  if (tabContainer) {
    if (isGuru) {
      tabContainer.classList.replace('grid-cols-5', 'grid-cols-3');
    } else {
      tabContainer.classList.replace('grid-cols-3', 'grid-cols-5');
    }
  }

  if (!isGuru && btnSettings) {
     btnSettings.classList.remove('hidden');
  }

  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('main-dashboard').classList.remove('hidden');
  muatAwalSeluruhKonfigurasi();
}

function periksaSesiLoginOtomatis() {
  const dataLokal = localStorage.getItem("kliksurat_sd_session");
  if (dataLokal) {
    try {
      const sesi = JSON.parse(dataLokal);
      // Pastikan data username ada, jika tidak ada (data lama), paksa login ulang
      if (sesi && sesi.terautentikasi && sesi.username) {
        aktifkanSesiDashboard(sesi.nama, sesi.role, sesi.username);
        return; // Keluar agar tidak mematikan loading prematurely
      } else {
        localStorage.removeItem("kliksurat_sd_session");
      }
    } catch (err) {
      localStorage.removeItem("kliksurat_sd_session"); // Hapus jika data korup
    }
  }
  setLoading(false);
}

function handleLogout() {
  Swal.fire({
    title: 'Yakin Ingin Keluar?',
    text: "Sesi kerja Anda akan diakhiri. Pastikan semua data penting telah disimpan.",
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#e11d48', // Warna merah tegas (Rose-600) untuk tanda peringatan
    cancelButtonColor: '#64748b',  // Warna Slate Grey untuk tombol batal
    confirmButtonText: '<i class="fa fa-sign-out-alt"></i> Ya, Keluar',
    cancelButtonText: 'Batal',
    reverseButtons: true           // Memposisikan tombol batal di kiri agar lebih natural
  }).then((result) => {
    if (result.isConfirmed) {
      prosesLogoutSistem(true);
    }
  });
}

function prosesLogoutSistem(withNotification = false) {
  setLoading(true, "Mengakhiri sesi...");

  setTimeout(() => {
    localStorage.removeItem("kliksurat_sd_session");
    
    // Reset variabel sesi global
    userSessionName = "";
    userSessionUsername = "";
    
    // Tutup paksa semua modal yang mungkin masih terbuka
    const modals = ['modal-profile', 'modal-settings', 'modal-siswa', 'modal-guru', 'modal-about', 'modal-cropper'];
    modals.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.add('hidden');
    });

    const pwd = document.getElementById('password');
    if (pwd) pwd.value = "";
    
    setLoading(false);

    const dashboard = document.getElementById('main-dashboard');
    const loginPage = document.getElementById('login-page');
    
    if (dashboard) dashboard.classList.add('hidden');
    if (loginPage) loginPage.classList.remove('hidden');
    
    if (withNotification) {
      Swal.fire({
        icon: 'success',
        title: 'Berhasil Keluar',
        text: 'Sesi aman Anda telah ditutup.',
        confirmButtonColor: '#0284c7',
        timer: 1500,
        showConfirmButton: false
      });
    }
  }, 700);
}

function sinkronisasiLayoutKonfigurasi() {
  const size = document.getElementById('in_ukuran_kertas')?.value || "size-f4";
  const mt = document.getElementById('in_margin_atas')?.value || 20;
  const mb = document.getElementById('in_margin_bawah')?.value || 20;
  const ml = document.getElementById('in_margin_kiri')?.value || 25;
  const mr = document.getElementById('in_margin_kanan')?.value || 20;
  const satuan_val = document.getElementById('in_satuan_margin')?.value || "mm";

  // Sinkronisasi lebar measurement box agar akurat dengan lebar kertas asli
  const mBox = document.getElementById('measurement-box');
  if (mBox) {
    mBox.style.width = (size === 'size-f4') ? "215mm" : "210mm";
    mBox.style.padding = `${mt}${satuan_val} ${mr}${satuan_val} ${mb}${satuan_val} ${ml}${satuan_val}`;
    mBox.style.fontFamily = document.getElementById('in_pilihan_font')?.value === 'font-serif-official' ? 'Times New Roman' : 'Arial';
    mBox.style.fontSize = document.getElementById('in_ukuran_font')?.value || '12pt';
  }

  // Hitung tinggi kertas dan tinggi bersih konten
  // PENTING: Gunakan variabel lokal yang sudah didefinisikan (mt, mb, satuan_val)
  let printStyle = document.getElementById('dynamic-print-style');
  if (!printStyle) {
    printStyle = document.createElement('style');
    printStyle.id = 'dynamic-print-style';
    document.head.appendChild(printStyle);
  }
  
  
  const sheetW = size === 'size-f4' ? '215mm' : '210mm';
  const sheetH = size === 'size-f4' ? '330mm' : '297mm';
  const innerH = `calc(${sheetH} - ${mt}${satuan_val} - ${mb}${satuan_val})`;

  document.documentElement.style.setProperty('--sheet-width', sheetW);
  document.documentElement.style.setProperty('--sheet-height', sheetH);
  document.documentElement.style.setProperty('--inner-height', innerH);

  let ukuranFisikKertas = (size === 'size-f4') ? '215mm 330mm' : 'A4';
  printStyle.innerHTML = `@media print { @page { size: ${ukuranFisikKertas}; margin: 0 !important; } }`;

  updateLivePreview();
  window.requestAnimationFrame(() => {
    if (typeof updateLivePreview === "function") updateLivePreview();
  });
  stabilkanLivePreviewSetelahLayout();
}

// Optimalisasi: Gunakan Debounce agar tidak lag saat mengetik cepat
function debounce(func, wait) {
  let timeout;
  return function executedFunction(...args) {
    const later = () => {
      clearTimeout(timeout);
      func(...args);
    };
    clearTimeout(timeout);
    timeout = setTimeout(later, wait);
  };
}

 * Membagi konten surat ke dalam beberapa halaman fisik secara real-time.
 */
function updateLivePreview() {
  menjalankanUpdatePreviewLangsung();
  if (typeof syncArchiveStatusUI === 'function') {
    syncArchiveStatusUI();
  }
}

function stabilkanLivePreviewSetelahLayout() {
  clearTimeout(livePreviewStabilizerTimer);

  const rerender = () => {
    window.requestAnimationFrame(() => {
      window.requestAnimationFrame(() => {
        if (typeof menjalankanUpdatePreviewLangsung === "function") {
          menjalankanUpdatePreviewLangsung();
        }
      });
    });
  };

  livePreviewStabilizerTimer = setTimeout(rerender, 300);
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(rerender).catch(() => {});
  }
}

let editorReady = false;

function initTinyMCEEditor() {
  if (typeof tinymce === 'undefined') return;
  
  tinymce.init({
    selector: '#quill-isi',
    license_key: 'gpl', // Menggunakan mode bebas/GPL
    height: 400,
    menubar: false,
    plugins: 'table lists link image charmap preview anchor searchreplace visualblocks code fullscreen insertdatetime media help wordcount',
    toolbar: 'undo redo | blocks | fontfamily fontsize | bold italic underline forecolor backcolor | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | table link image | removeformat code',
    toolbar_mode: 'wrap', // Memaksa semua menu toolbar muncul (wrap) tanpa menu titik tiga
    promotion: false, // Menghilangkan tombol upgrade yang mengganggu
    branding: false, // Menghilangkan logo TinyMCE di status bar
    content_style: 'body { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; line-height: 1.6; }',
    setup: function (editor) {
      // Shortcut Ctrl+S di dalam editor
      editor.addShortcut('ctrl+s', 'Simpan Data', function () {
        prosesSimpanData();
      });

      // Menangani tombol Tab agar melakukan indentasi di dalam editor
      editor.on('keydown', function (e) {
        if (e.keyCode === 9) { // 9 adalah kode kunci untuk tombol Tab
          if (e.shiftKey) {
            editor.execCommand('Outdent');
          } else {
            editor.execCommand('Indent');
          }
          e.preventDefault();
          e.stopPropagation();
        }
      });
      editor.on('init', function () {
        editorReady = true;
        const savedVal = document.getElementById('in_isi').value;
        if (savedVal) editor.setContent(savedVal);
      });
      editor.on('change input undo redo', function () {
        const content = editor.getContent();
        document.getElementById('in_isi').value = content;
        updateLivePreview();
      });
    },
    font_family_formats: 'Arial=arial,helvetica,sans-serif; Times New Roman=times new roman,times,serif; Courier New=courier new,courier,monospace;',
    table_appearance_options: true,
    table_resize_bars: true,
    table_default_attributes: { border: '0' } // Mengubah default border menjadi 0
  });
}

/**
 * Global Helper untuk Escaping HTML
 */
const escapeHTML = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
  '&': '&amp;',
  '<': '&lt;',
  '>': '&gt;',
  '"': '&quot;',
  "'": '&#39;'
}[char]));

/**
 * ENGINE: Variable Resolver - Mengganti {{variabel}} dengan data asli
 */
function resolveVariables(text) {
  if (!text) return "";
  let result = text;

  // Fungsi Pembantu: Mengubah teks menjadi format Proper Case (Kapital Setiap Kata)
  const toProperCase = (str) => {
    if (!str || typeof str !== 'string') return str;
    return str.toLowerCase().replace(/(^|\s)\S/g, (L) => L.toUpperCase());
  };

  // 1. Variabel Pejabat (KS) - Mengambil data live dari sidebar agar real-time
  const getTtdLive = (id, key, fallback) => {
    const val = document.getElementById(id)?.value;
    return (val && val.trim() !== "") ? val : (window.configPejabat[key] || fallback);
  };
  // KECUALI: nama_ks (Tetap)
  result = result.replace(/{{nama_ks}}/g, getTtdLive('p1_nama', 'nama', ".................."));
  result = result.replace(/{{nip_ks}}/g, getTtdLive('p1_nip', 'nip', ".................."));
  // PROPER: jabatan_ks, pangkat_ks
  result = result.replace(/{{jabatan_ks}}/g, toProperCase(getTtdLive('p1_jabatan', 'jabatan', "Kepala Sekolah")));
  result = result.replace(/{{pangkat_ks}}/g, getTtdLive('p1_pangkat', 'pangkat', ""));

  // 2. Variabel Siswa
  const s = window.selectedSiswa || {};
  // KECUALI: nama_siswa (Tetap)
  result = result.replace(/{{nama_siswa}}/g, s.Nama || "..................");
  result = result.replace(/{{nisn}}/g, s.NISN || "..................");
  result = result.replace(/{{nis}}/g, s.NIS || "..................");
  // PROPER: tempat_lahir, alamat lengkap, ket_lulus
  result = result.replace(/{{tempat_lahir}}/g, toProperCase(s.Tempat_Lahir || ".................."));
  result = result.replace(/{{tanggal_lahir}}/g, formatTanggalIndo(s.Tanggal_Lahir));
  result = result.replace(/{{dusun}}/g, toProperCase(s.Dusun || ".................."));
  result = result.replace(/{{desa}}/g, toProperCase(s.Desa || ".................."));
  result = result.replace(/{{rt}}/g, s.RT || "...");
  result = result.replace(/{{rw}}/g, s.RW || "...");
  result = result.replace(/{{kecamatan}}/g, toProperCase(s.Kecamatan || ".................."));
  result = result.replace(/{{kabupaten}}/g, toProperCase(s.Kabupaten || ".................."));
  // KECUALI: nama_ayah, nama_ibu (Tetap)
  result = result.replace(/{{nama_ayah}}/g, s.Nama_Ayah || "..................");
  result = result.replace(/{{nama_ibu}}/g, s.Nama_Ibu || "..................");
  result = result.replace(/{{kelas}}/g, s.Kelas || "..................");
  result = result.replace(/{{tahun_ajaran}}/g, s.Tahun_Ajaran || "..................");
  // KECUALI: va_pip (no_va), rek_pip (no_rek) (Tetap)
  result = result.replace(/{{va_pip}}/g, s.VA_PIP || "-");
  result = result.replace(/{{rek_pip}}/g, s.Rek_PIP || "-");
  result = result.replace(/{{nomor_ijazah}}/g, s.Nomor_Ijazah || "..................");
  result = result.replace(/{{ket_lulus}}/g, toProperCase(s.Ket_Lulus || ".................."));

  // 3. Variabel Guru
  const g = window.selectedGuru || {};
  result = result.replace(/{{nama_guru}}/g, g.Nama || "..................");
  result = result.replace(/{{nip_guru}}/g, g.NIP || "..................");
  result = result.replace(/{{nuptk_guru}}/g, g.NUPTK || "..................");
  // PROPER: jabatan, pangkat, unit, tugas
  result = result.replace(/{{jabatan_guru}}/g, g.Jabatan || "..................");
  result = result.replace(/{{pangkat_guru}}/g, g.Pangkat_Golongan || "..................");
  result = result.replace(/{{unit_kerja}}/g, toProperCase(g.Unit_Kerja || ".................."));
  result = result.replace(/{{tugas_utama}}/g, toProperCase(g.Tugas_Utama || ".................."));
  result = result.replace(/{{tugas_tambahan}}/g, toProperCase(g.Tugas_Tambahan || ".................."));

  // 3. Variabel Nilai (1-10)
  const mapelNames = [
    "Pendidikan Agama dan Budi Pekerti",
    "Pendidikan Pancasila",
    "Bahasa Indonesia",
    "Matematika",
    "Ilmu Pengetahuan Alam dan Sosial",
    "Pendidikan Jasmani, Olahraga, dan Kesehatan",
    "Seni dan Budaya",
    "Bahasa Inggris",
    "Bahasa Madura",
    "Baca Tulis Al Quran (BTA)"
  ];

  mapelNames.forEach((name, i) => {
    result = result.replace(new RegExp(`{{nilai_${i+1}}}`, 'g'), s[name] || "0");
  });

  // 4. Variabel Sekolah (Identitas KOP & Global)
  const getKopLive = (id, fallback) => {
    const val = document.getElementById(id)?.value;
    return (val && val.trim() !== "") ? val : fallback;
  };
  // KECUALI: nama_sekolah (Tetap)
  result = result.replace(/{{nama_sekolah}}/g, getKopLive('in_kop_sekolah', "SD Negeri ..."));
  result = result.replace(/{{npsn_sekolah}}/g, getKopLive('in_npsn_sekolah', "........"));
  result = result.replace(/{{alamat_sekolah}}/g, getKopLive('in_kop_alamat', "........"));
  result = result.replace(/{{kontak_sekolah}}/g, getKopLive('in_kop_kontak', "........"));
  // PROPER: daerah, sub_dinas
  result = result.replace(/{{daerah_sekolah}}/g, toProperCase(getKopLive('in_kop_daerah', "........")));
  result = result.replace(/{{sub_dinas}}/g, toProperCase(getKopLive('in_kop_sub', "........")));

  // 5. Variabel Dokumen
  result = result.replace(/{{nomor_surat}}/g, document.getElementById('in_nomor')?.value || "........");
  // PROPER: perihal
  result = result.replace(/{{tanggal_surat}}/g, formatTanggalIndo(document.getElementById('in_tanggal')?.value));
  result = result.replace(/{{perihal}}/g, toProperCase(document.getElementById('in_perihal')?.value || "........"));

  return result;
}

function menjalankanUpdatePreviewLangsung() {
  const printArea = document.getElementById('print-area');
  if (!printArea) return;

  printArea.innerHTML = "";
  let pageCount = 0;
  
  // Tentukan list entitas (Bisa Siswa atau Guru)
  let activeList = [null];
  if (window.isBatchMode && window.selectedSiswaList.length > 0) activeList = window.selectedSiswaList;
  else if (window.isBatchModeGuru && window.selectedGuruList.length > 0) activeList = window.selectedGuruList;
  else if (window.selectedSiswa) activeList = [window.selectedSiswa];
  else if (window.selectedGuru) activeList = [window.selectedGuru];
  
  // Integrasi Resolver: Semua input diproses dulu variabelnya
  const getRawVal = (id, fallback = "") => document.getElementById(id)?.value ?? fallback;
  
  activeList.forEach((item, index) => {
    // Swap context berdasarkan tipe data yang masuk
    if (item && item.NISN) window.selectedSiswa = item;
    else if (item && item.NIP) window.selectedGuru = item;

    const getVal = (id, fallback = "") => resolveVariables(document.getElementById(id)?.value ?? fallback);

  const layoutType = getRawVal('in_layout_type', 'standard');
  const previousPageCount = parseInt(printArea.dataset.pageCount || "0", 10);
  const nl2br = (value) => escapeHTML(value).replace(/\n/g, '<br>');
  const isValidUrl = (url) => /^https?:\/\//i.test(String(url || ""));

    const size = getVal('in_ukuran_kertas', "size-f4");
  const font = getVal('in_pilihan_font', "font-serif-official");
  const fontSize = getVal('in_ukuran_font', "12pt");
  const marginSatuan = "mm"; // Paksa mm untuk kalkulasi presisi
  const margins = {
    t: getVal('in_margin_atas', 20),
    b: getVal('in_margin_bawah', 20),
    l: getVal('in_margin_kiri', 25),
    r: getVal('in_margin_kanan', 20)
  };
  const sheetHeightMm = size === 'size-f4' ? 330 : 297;
  const sheetWidth = size === 'size-f4' ? '215mm' : '210mm';
  const sheetHeight = size === 'size-f4' ? '330mm' : '297mm';
  document.documentElement.style.setProperty('--sheet-width', sheetWidth);
  document.documentElement.style.setProperty('--sheet-height', sheetHeight);
  document.documentElement.style.setProperty('--inner-height', `calc(${sheetHeight} - ${margins.t}${marginSatuan} - ${margins.b}${marginSatuan})`);
  const pxPerMm = 96 / 25.4;
  const fallbackInnerHeight = Math.max(100, (sheetHeightMm - parseFloat(margins.t) - parseFloat(margins.b)) * pxPerMm);

  let currentPage = null;
  let currentContent = null;

  
  const createNewPage = () => {
    const pageNumber = pageCount + 1;
    const p = document.createElement('div');
    p.className = `page-sheet shadow-2xl text-black ${size} ${font}`;
    const spacing = document.getElementById('in_line_spacing')?.value || "1.6";
    p.style.lineHeight = spacing;
    if (pageNumber > previousPageCount) p.classList.add('page-enter');
    p.dataset.pageNumber = pageNumber;
    p.style.fontSize = fontSize;
    p.style.padding = `${margins.t}${marginSatuan} ${margins.r}${marginSatuan} ${margins.b}${marginSatuan} ${margins.l}${marginSatuan}`;
    p.innerHTML = `<div class="content-wrapper" style="height: var(--inner-height); position: relative; box-sizing: border-box; min-height: 1px; overflow: hidden;"></div>`;
    return p;
  };

  const appendNewPage = () => {
    const page = createNewPage();
    printArea.appendChild(page);
    pageCount++;
    currentPage = page;
    currentContent = page.querySelector('.content-wrapper');
  };

  const getInnerHeight = () => {
    if (!currentContent) return fallbackInnerHeight;
    const measured = currentContent.clientHeight || currentContent.getBoundingClientRect().height;
    return measured > 20 ? measured : fallbackInnerHeight;
  };

  const pageOverflows = () => currentContent.scrollHeight > getInnerHeight() + 2;

  const addBlock = (block) => {
    let attempts = 0;

    while (attempts < 6) {
      currentContent.appendChild(block);
      if (!pageOverflows()) {
        return block;
      }

      currentContent.removeChild(block);
      appendNewPage();
      attempts += 1;
    }

    currentContent.appendChild(block);
    return block;
  };

  const addHtmlBlock = (html, className = "") => {
    const wrapper = document.createElement('div');
    if (className) wrapper.className = className;
    wrapper.innerHTML = html;
    return addBlock(wrapper);
  };

  const addQuillHtmlBlock = (html) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'preview-rich-content';
    wrapper.innerHTML = html;
    addBlock(wrapper);
  };

  const addParagraph = (text) => {
    const cleanText = String(text || "");
    if (cleanText.trim() === "") {
      const spacer = document.createElement('div');
      spacer.style.height = "1em";
      addBlock(spacer);
      return;
    }

    const paragraph = document.createElement('p');
    paragraph.className = "mb-2 text-justify";
    paragraph.textContent = cleanText;
    addBlock(paragraph);

    if (!pageOverflows()) return;
    if (paragraph.parentNode !== currentContent) return;

    currentContent.removeChild(paragraph);
    const words = cleanText.split(/(\s+)/).filter(part => part.length > 0);
    let active = document.createElement('p');
    active.className = "mb-2 text-justify";
    currentContent.appendChild(active);

    words.forEach((word) => {
      const previous = active.textContent;
      active.textContent += word;
      if (pageOverflows() && previous !== "") {
        active.textContent = previous.trimEnd();
        appendNewPage();
        active = document.createElement('p');
        active.className = "indent-[40px] mb-2 text-justify";
        active.textContent = word.trimStart();
        currentContent.appendChild(active);
      }
    });
  };

  const forcePageBreak = () => {
    if (currentContent.children.length === 0 && pageCount > 1) return;
    appendNewPage();
  };

  appendNewPage();

  const lKiri = getVal('in_logo_kiri');
  const lKanan = getVal('in_logo_kanan');
  addHtmlBlock(`
    <div class="kop-surat flex items-center border-b-[4px] border-double border-black pb-1.5 mb-5 select-none shrink-0">
    ${isValidUrl(lKiri) ? `<img class="w-20 h-24 object-contain shrink-0" src="${escapeHTML(lKiri)}" alt="">` : ''}
    <div class="flex-1 text-center px-4 min-w-0">
      <h4 class="text-[12pt] font-bold uppercase leading-tight">${escapeHTML(getVal('in_kop_daerah'))}</h4>
      <h4 class="text-[12pt] font-bold uppercase leading-tight">${escapeHTML(getVal('in_kop_sub'))}</h4>
      <h4 class="text-[12pt] font-bold uppercase leading-tight">${escapeHTML(getVal('in_kop_sekolah'))}</h4>
      <p class="text-[9pt] leading-tight mt-1">${escapeHTML(getVal('in_kop_alamat'))}</p>
      <p class="text-[9pt] italic leading-tight mt-0.5">${escapeHTML(getVal('in_kop_kontak'))}</p>
    </div>
    ${isValidUrl(lKanan) ? `<img class="w-20 h-24 object-contain shrink-0" src="${escapeHTML(lKanan)}" alt="">` : ''}
    </div>`);

  const tglIndo = formatTanggalIndo(getVal('in_tanggal'));

  if (layoutType === "centered") {
    // Layout KHUSUS: Judul dan Nomor di Tengah (SKL / SK)
    addHtmlBlock(`
      <div class="text-center mb-8 mt-4">
        <h2 class="text-[14pt] font-bold uppercase underline decoration-1 underline-offset-4">${escapeHTML(getVal('in_perihal') || 'SURAT KETERANGAN')}</h2>
        <p class="text-[12pt] mt-1">Nomor: ${escapeHTML(getVal('in_nomor') || '...')}</p>
      </div>
    `);
  } else {
    // Layout STANDARD: Metadata di Kiri
    addHtmlBlock(`
      <div class="metadata-surat w-full mb-6">
      <table class="w-full">
        <tr class="align-top">
          <td class="w-[60%]">
            <table class="w-full">
              <tr><td class="w-[90px]">Nomor</td><td class="w-[15px]">:</td><td>${escapeHTML(getVal('in_nomor') || '...')}</td></tr>
              <tr><td>Sifat</td><td>:</td><td>${escapeHTML(getVal('in_sifat'))}</td></tr>
              <tr><td>Lampiran</td><td>:</td><td>${escapeHTML(getVal('in_lampiran') || '-')}</td></tr>
              <tr><td>Perihal</td><td>:</td><td class="font-bold">${escapeHTML(getVal('in_perihal') || '...')}</td></tr>
            </table>
          </td>
          <td class="w-[40%] text-right">${escapeHTML(getVal('in_lokasi'))}, ${escapeHTML(tglIndo)}</td>
        </tr>
      </table></div>`);
  }

  const isiPenerima = getVal('in_penerima');
  if (isiPenerima.trim() !== "") {
    addHtmlBlock(`<div class="mb-6"><p>${escapeHTML(getVal('in_label_penerima'))}</p><div class="font-bold whitespace-pre-wrap">${nl2br(isiPenerima)}</div></div>`);
  }

  addHtmlBlock(`<p class="mb-4">${escapeHTML(getVal('in_pembuka') ,)}</p>`);

  // Isi surat diproses variabelnya (TinyMCE Content)
  const isiSurat = resolveVariables(getRawVal('in_isi'));
  if (isiSurat.trim() !== "") {
    if (/<[a-z][\s\S]*>/i.test(isiSurat)) {
      const richWrapper = document.createElement('div');
      richWrapper.innerHTML = isiSurat;
      const childNodes = Array.from(richWrapper.childNodes);
      childNodes.forEach((node) => {
        if (node.nodeType === Node.ELEMENT_NODE) {
          addQuillHtmlBlock(node.outerHTML);
        } else if (node.nodeType === Node.TEXT_NODE && node.textContent.trim() !== '') {
          addParagraph(node.textContent);
        }
      });
    } else {
      const lines = isiSurat.split('\n');
      lines.forEach(line => {
        if (line.trim() === "---") {
          forcePageBreak();
          return;
        }

        if (line.includes(" : ")) {
          let parts = line.split(" : ");
          addHtmlBlock(`<table style="width: calc(100% - 40px); margin: 5px 0 5px 40px; table-layout: fixed;">
            <tr><td style="width: 130px; vertical-align: top;">${escapeHTML(parts[0].trim())}</td>
            <td style="width: 20px; vertical-align: top;">:</td>
            <td style="vertical-align: top;">${escapeHTML(parts.slice(1).join(" : ").trim())}</td></tr></table>`);
        } else {
          addParagraph(line);
        }
      });
    }
  }

  const finalBlock = document.createElement('div');
  finalBlock.className = "mt-8 relative";
  
  const ttdDiv = document.createElement('div');
  ttdDiv.id = "canvas-area-ttd";
  finalBlock.appendChild(ttdDiv);
  renderKomponenSpesimenTtd(ttdDiv);

  const footerBlock = document.createElement('div');
  const tembusanText = getVal('in_tembusan');
  footerBlock.id = "active-footer-logic";
  footerBlock.className = "absolute left-0 bottom-0 max-w-[230px] text-[9pt]";
  footerBlock.innerHTML = `
    <div class="flex flex-col items-start opacity-80">
      <div class="flex flex-col items-center">
        <div id="qrcode" class="p-0.5 border border-slate-100 rounded-md bg-white" style="width: 69px; height: 69px; display: flex; align-items: center; justify-content: center;"></div>
        <span class="text-[6pt] mt-1 font-mono text-[#0f172a]">Verifikasi Dokumen</span>
      </div>
    </div>
    <div id="container_tembusan" class="${tembusanText.trim() ? '' : 'hidden'} mt-2">
      <p class="font-bold underline mb-0.5">Tembusan:</p>
      <div id="view_tembusan" class="whitespace-pre-wrap italic leading-tight border-l-2 border-slate-100 pl-2">${nl2br(tembusanText)}</div>
    </div>`;
  finalBlock.appendChild(footerBlock);

  currentContent.appendChild(finalBlock);
  renderQRCodeVerifikasiInto(footerBlock);
  const finalOverflowPx = currentContent.scrollHeight - getInnerHeight();
  if (finalOverflowPx > 24 && currentContent.children.length > 1) {
    currentContent.removeChild(finalBlock);
    appendNewPage();
    currentContent.appendChild(finalBlock);
  }
  }); // End of listSiswa loop

  document.getElementById('current-page-val').innerText = pageCount;
  printArea.dataset.pageCount = pageCount;
}

/**
 * Helper: Render QR Code ke kontainer footer yang aktif
 */
function renderQRCodeVerifikasiInto(footerElement) {
  const inpTembusan = document.getElementById('in_tembusan')?.value || "";
  const viewTembusan = footerElement.querySelector('#view_tembusan');
  const contTembusan = footerElement.querySelector('#container_tembusan');
  
  if (viewTembusan && contTembusan && inpTembusan.trim() !== "") {
    contTembusan.classList.remove('hidden');
    viewTembusan.innerText = inpTembusan;
  }

  const qrContainer = footerElement.querySelector('#qrcode');
  if (qrContainer) {
    const sid = document.getElementById('in_serial_id').value || "VALID";
    let qrText = `VERIFIED DOCUMENT\nID: ${sid}`;
    if (webAppUrl && webAppUrl.includes('/exec')) {
       qrText = webAppUrl + (webAppUrl.includes('?') ? '&' : '?') + "id=" + sid + "&mode=1";
    }
    qrContainer.style.width = '69px';
    qrContainer.style.height = '69px';
    qrContainer.style.display = 'flex';
    qrContainer.style.alignItems = 'center';
    qrContainer.style.justifyContent = 'center';
    qrContainer.style.backgroundColor = '#ffffff';

    const paintQrImage = (src) => {
      qrContainer.innerHTML = "";
      const img = document.createElement('img');
      img.src = src;
      img.alt = "QR Verifikasi";
      img.style.display = 'block';
      img.style.width = '65px';
      img.style.height = '65px';
      img.style.maxWidth = '65px';
      img.style.maxHeight = '65px';
      qrContainer.appendChild(img);
    };

    if (qrPreviewCache.text === qrText && qrPreviewCache.src) {
      paintQrImage(qrPreviewCache.src);
      return;
    }

    if (typeof QRCode === "undefined") {
      setTimeout(() => {
        if (footerElement.isConnected) renderQRCodeVerifikasiInto(footerElement);
      }, 250);
      return;
    }

    try {
      const tmpQr = document.createElement('div');
      tmpQr.style.position = 'fixed';
      tmpQr.style.left = '-9999px';
      tmpQr.style.top = '-9999px';
      document.body.appendChild(tmpQr);

      new QRCode(tmpQr, { text: qrText, width: 96, height: 96, correctLevel: QRCode.CorrectLevel.M });
      const canvas = tmpQr.querySelector('canvas');
      const img = tmpQr.querySelector('img');
      const src = canvas ? canvas.toDataURL('image/png') : (img ? img.src : "");
      tmpQr.remove();

      if (src) {
        qrPreviewCache = { text: qrText, src };
        paintQrImage(src);
      }
    } catch (err) {
      qrContainer.innerHTML = '<span style="font-size:8pt;font-weight:700;color:#0f172a;">QR</span>';
    }
  }
}

function formatTanggalIndo(dateString) {
  if (!dateString) return "..................";
  
  let parts;
  if (dateString.includes("-")) {
    parts = dateString.split('-'); // YYYY-MM-DD
  } else if (dateString.includes("/")) {
    parts = dateString.split('/').reverse(); // DD/MM/YYYY -> [YYYY, MM, DD]
  } else {
    return dateString;
  }

  if(parts.length !== 3) return dateString;

  const tahun = parseInt(parts[0], 10);
  const bulan = parseInt(parts[1], 10) - 1;
  const tanggal = parseInt(parts[2], 10);
  
  const bulanIndo = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
  return `${tanggal} ${bulanIndo[bulan]} ${tahun}`;
}

let cropperInstance = null;
let currentCropPosition = '';

function prosesUnggahLogoKeDrive(posisi) {
  const fileInput = document.getElementById(posisi === 'left' ? 'file_logo_kiri' : 'file_logo_kanan');
  const file = fileInput?.files[0];
  if (!file) return;

  currentCropPosition = posisi;
  const reader = new FileReader();
  reader.onload = function(e) {
    const imgElement = document.getElementById('image-to-crop');
    imgElement.src = e.target.result;
    
    document.getElementById('modal-cropper').classList.remove('hidden');
    
    if (cropperInstance) cropperInstance.destroy();
    
    // Pastikan library CropperJS sudah dimuat dalam global scope
    const CropperLib = window.Cropper || Cropper;
    if (typeof CropperLib === 'undefined') {
      tampilkanToast("error", "GAGAL MEMUAT", "Library pemotong gambar belum siap. Silakan muat ulang halaman (F5).");
      return;
    }

    cropperInstance = new CropperLib(imgElement, {
      aspectRatio: NaN, // User bebas menentukan lebar/tinggi
      viewMode: 1,
      autoCropArea: 0.8,
      restore: false,
      guides: true,
      center: true,
      highlight: false,
      cropBoxMovable: true,
      cropBoxResizable: true
    });

    document.getElementById('btn-do-crop').onclick = function() {
      const canvas = cropperInstance.getCroppedCanvas({
        width: 500, // Ukuran ideal agar logo tajam tapi file ringan
        height: 600,
        imageSmoothingEnabled: true,
        imageSmoothingQuality: 'high',
      });
      
      // Paksa ke image/png untuk stabilitas encoding dan dukungan transparansi penuh
      const croppedBase64 = canvas.toDataURL('image/png');
      const base64Data = croppedBase64.split(',')[1];
      
      tutupModalCropper();
      lakukanUploadLogoFinal('image/png', base64Data, currentCropPosition);
    };
  };
  reader.readAsDataURL(file);
}

function tutupModalCropper() {
  document.getElementById('modal-cropper').classList.add('hidden');
  if (cropperInstance) {
    cropperInstance.destroy();
    cropperInstance = null;
  }
  // Reset file input
  document.getElementById('file_logo_kiri').value = "";
  document.getElementById('file_logo_kanan').value = "";
}

function lakukanUploadLogoFinal(mimeType, base64Data, posisi) {
  setLoading(true, "Mengunggah logo " + posisi + "...");
  google.script.run.withSuccessHandler(function(response) {
    if (response && response.status === "SUCCESS") {
      document.getElementById(posisi === 'left' ? 'in_logo_kiri' : 'in_logo_kanan').value = response.url;
      if (posisi === 'right' && document.getElementById('brand-logo-nav')) {
        document.getElementById('brand-logo-nav').src = response.url;
      }
      updateLivePreview();
      let dataOtoSimpan = {}; 
      dataOtoSimpan[posisi === 'left' ? "Logo_Kiri_Url" : "Logo_Kanan_Url"] = response.url;
      google.script.run.withSuccessHandler(()=> {
        setLoading(false); tampilkanToast("success", "BERHASIL", `Logo ${posisi} diunggah.`);
      }).simpanPengaturanKop(dataOtoSimpan);
    } else { 
      setLoading(false); 
      tampilkanToast("error", "GAGAL", response ? response.message : "Gagal mengunggah gambar."); 
    }
  }).withFailureHandler(function(err){
    setLoading(false);
    tampilkanToast("error", "CRITICAL ERROR", err.toString());
  }).uploadFileLogoKeDrive(mimeType, base64Data, posisi.toUpperCase());
}

  const select = document.getElementById('in_kode_klasifikasi');
  const listBox = document.getElementById('daftar-kode-klasifikasi');
  const escapeText = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[char]));
  const items = (data && data.length) ? data : [
    { kode: "400.3.5", nama: "Administrasi Sekolah" },
    { kode: "005", nama: "Undangan" }
  ];

  if (select) {
    const currentValue = select.value;
    select.innerHTML = items.map(item => {
      const label = item.nama ? `${item.kode} - ${item.nama}` : item.kode;
      return `<option value="${escapeText(item.kode)}">${escapeText(label)}</option>`;
    }).join('');
    if (items.some(item => item.kode === currentValue)) select.value = currentValue;
  }

  if (listBox) {
    listBox.innerHTML = items.map(item => `
      <div class="flex items-center justify-between gap-2 rounded-lg border border-slate-100 dark:border-slate-700 bg-white/70 dark:bg-slate-800/70 px-2.5 py-1.5">
        <div class="flex flex-col">
          <span class="font-mono font-bold text-brand-blue text-xs">${escapeText(item.kode)}</span>
          <span class="text-[10px] text-slate-500 dark:text-slate-300 truncate max-w-[150px]">${escapeText(item.nama || '-')}</span>
        </div>
        <button onclick="hapusKlasifikasi('${escapeText(item.kode)}')" class="text-rose-400 hover:text-rose-600 transition-colors">
          <i class="fa fa-times-circle"></i>
        </button>
      </div>
    `).join('');
  }
}

function prosesSimpanData() {
  const packNomor = document.getElementById('in_nomor')?.value;
  const packPerihal = document.getElementById('in_perihal')?.value;

  // 1. Validasi Input Utama Surat
  if(!packNomor || !packPerihal) {
    Swal.fire({ 
      icon: 'warning', 
      title: 'Data Belum Lengkap', 
      text: 'Nomor dan Perihal wajib diisi!', 
      confirmButtonColor: '#0284c7' 
    });
    return;
  }

  // Paksa pembuatan Serial ID baru setiap kali tombol "Simpan Data" ditekan.
  // Ini memastikan setiap entri log baru di database memiliki identitas unik (Audit Trail).
  const inSid = document.getElementById('in_serial_id');
  if (inSid) {
    inSid.value = "V" + Math.random().toString(36).substring(2, 9).toUpperCase();
    shortUrlCache = ""; 
    lastSidForShortening = "";
    updateLivePreview(); 
  }

  // 2. Hanya Ambil Data Teks Surat (Kop dan TTD tidak ikut dikemas)
  const dataSuratMurni = {
    nomor: packNomor,
    tanggal: document.getElementById('in_tanggal')?.value || "",
    perihal: packPerihal,
    penerima: document.getElementById('in_penerima')?.value || "",
    lampiran: document.getElementById('in_lampiran')?.value || "",
    pembuka: document.getElementById('in_pembuka')?.value || "",
    isi: document.getElementById('in_isi')?.value || "",
    tembusan: document.getElementById('in_tembusan')?.value || "",
    operator: typeof userSessionName !== "undefined" ? userSessionName : "Admin",
    serial_id: document.getElementById('in_serial_id')?.value || "-",
    ref_id: window.selectedSiswa?.NISN || window.selectedGuru?.NIP || ""
  };

  // 3. Validasi Duplikat di Server sebelum Konfirmasi
  const urutan = dataSuratMurni.nomor.split('/')[1];
  const tahun = dataSuratMurni.nomor.split('/').pop();

  google.script.run.withSuccessHandler(function(status) {
    if (status === "DUPLICATE" || status === "JUMP") {
      const msg = status === "DUPLICATE" 
        ? `Nomor ${urutan} sudah ada. Menyesuaikan urutan...` 
        : `Nomor ${urutan} melompati antrean. Menyesuaikan urutan...`;
      tampilkanToast("warning", "NOMOR DISESUAIKAN", msg);
      mintaNomorOtomatis();
      return;
    }

    // 4. Konfirmasi Simpan Arsip
    Swal.fire({
      title: 'Simpan Arsip Surat?',
      text: "Surat akan dicatat ke dalam log arsip database.",
      icon: 'question',
      showCancelButton: true,
      confirmButtonColor: '#10b981', 
      cancelButtonColor: '#64748b',
      confirmButtonText: 'Ya, Arsipkan',
      cancelButtonText: 'Batal'
    }).then((result) => {
      if (result.isConfirmed) {
        setLoading(true, "Mengarsipkan Surat...");
      
        google.script.run
        .withSuccessHandler(function(res) {
          setLoading(false);
          if (typeof muatDataArsip === "function") muatDataArsip(); 
          
          // Reset nomor otomatis untuk surat berikutnya
          mintaNomorOtomatis();
        
        // 5. Sukses Arsip, Tawarkan untuk Simpan Teks Ini Jadi Template
        Swal.fire({
          icon: 'success',
          title: 'Berhasil Diarsipkan!',
          text: 'Surat resmi masuk log arsip. Apakah isi teks surat ini ingin dijadikan Master Template baru?',
          showCancelButton: true,
          confirmButtonColor: '#0284c7',
          cancelButtonColor: '#64748b',
          confirmButtonText: '<i class="fa fa-save"></i> Jadikan Template',
          cancelButtonText: 'Tidak, Selesai'
        }).then((pilihan) => {
          if (pilihan.isConfirmed) {
            // Oper data surat murni ke fungsi pembuat nama template
            tanyakanNamaTemplateOtomatis(dataSuratMurni);
          } else {
            if (typeof bersihkanFormSuratSelesai === "function") bersihkanFormSuratSelesai();
          }
        });
      })
      .withFailureHandler(function(err) {
        setLoading(false);
        Swal.fire('Proses Gagal', err.toString(), 'error');
      })
      .simpanPaketSuratLengkap(dataSuratMurni); // Murni kirim teks surat saja
    }
    });
  }).cekNomorDuplikat(urutan, tahun);
}

function muatDraftAutosave() {
  const saved = localStorage.getItem('kliksurat_draft_autosave');

  try {
    const d = JSON.parse(saved);
    if (d.nomor || d.perihal || d.isi) {

      setIsiEditorValue(d.isi || "");

/**
 * Fitur: Ekspor seluruh template yang ada di cache ke file JSON
 */
function eksporTemplates() {
  if (!window.cacheTemplates || window.cacheTemplates.length === 0) {
    tampilkanToast("warning", "EKSPOR GAGAL", "Tidak ada template untuk diekspor.");
    return;
  }
  
  // Menggunakan Blob untuk ekspor JSON murni agar mendukung karakter khusus secara aman
  const blob = new Blob([JSON.stringify(window.cacheTemplates, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  
  const tgl = new Date().toISOString().split('T')[0];
  const exportFileDefaultName = `Backup_Template_Surat_${tgl}.json`;
  
  const linkElement = document.createElement('a');
  linkElement.setAttribute('href', url);
  linkElement.setAttribute('download', exportFileDefaultName);
  linkElement.click();
  URL.revokeObjectURL(url);
  tampilkanToast("success", "EKSPOR SELESAI", "File template berhasil diunduh.");
}

/**
 * Fitur: Menangani file yang dipilih untuk diimpor
 */
function handleImporFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      // Parsing langsung hasil pembacaan file sebagai JSON
      const importedData = JSON.parse(e.target.result);

      if (!Array.isArray(importedData)) throw new Error("Format data harus berupa Array JSON.");

      setLoading(true, "Mengimpor Template...");
      google.script.run.withSuccessHandler(function(res) {
        setLoading(false);
        if (res.status === "SUCCESS") {
          Swal.fire('Impor Berhasil', res.message, 'success');
          loadKoleksiDatabase();
        } else {
          tampilkanToast("error", "GAGAL", res.message);
        }
        event.target.value = ''; // Reset input
      }).imporTemplatesBatch(importedData);
    } catch (err) {
      Swal.fire('File Tidak Valid', 'Pastikan file adalah format JSON template yang benar.', 'error');
    }
  };
  reader.readAsText(file);
}

  setLoading(true, "Sinkronisasi template...");

    renderDropdownTemplate(window.cacheTemplates);
      renderSettingsTemplateList(); // Refresh list di modal pengaturan juga
  })

function renderDropdownTemplate(data) {
  const select = document.getElementById('in_pilih_template');
  if (!select) return;
  
  select.innerHTML = '<option value="">-- Buat Surat Baru (Kosong) --</option>';

    if (!data || data.length === 0) {
      let opt = document.createElement('option');
      opt.disabled = true;
      opt.text = "Tidak ada template yang tersimpan";
      select.appendChild(opt);
    } else {
      data.forEach((tpl, i) => {
        let opt = document.createElement('option');
        // Cari index asli dari cacheTemplates agar sinkron saat pilihTemplateDinamis dipanggil
        const originalIdx = window.cacheTemplates.findIndex(item => item.nama === tpl.nama);
        opt.value = originalIdx; 
        opt.text = "📄 " + tpl.nama;
        select.appendChild(opt);
      });
    }
}

function filterTemplate(query) {
  const resultsDiv = document.getElementById('search_results_list');
  if (!window.cacheTemplates || !resultsDiv) return;

  if (!query || query.trim() === "") {
    resultsDiv.innerHTML = "";
    resultsDiv.classList.add('hidden');
    return;
  }

  const filtered = window.cacheTemplates.filter(t => 
    t.nama.toLowerCase().includes(query.toLowerCase())
  );

  if (filtered.length === 0) {
    resultsDiv.innerHTML = '<div class="p-4 text-xs text-slate-400 text-center italic">Template tidak ditemukan...</div>';
  } else {
    resultsDiv.innerHTML = filtered.map(t => {
      const idx = window.cacheTemplates.findIndex(item => item.nama === t.nama);
      return `
        <div onclick="pilihDariPencarian(${idx}, '${t.nama.replace(/'/g, "\\'")}')" 
             class="p-3 text-xs hover:bg-sky-50 cursor-pointer flex items-center gap-3 transition-colors group">
          <div class="w-7 h-7 rounded-lg bg-slate-100 group-hover:bg-sky-100 flex items-center justify-center transition-colors">
            <i class="fa-regular fa-file-lines text-slate-400 group-hover:text-sky-600"></i>
          </div>
          <div class="flex flex-col overflow-hidden">
            <span class="font-semibold text-slate-700 group-hover:text-sky-700 truncate">${t.nama}</span>
            <span class="text-[9px] text-slate-400 truncate">${t.perihal || 'Tanpa Perihal'}</span>
          </div>
        </div>`;
    }).join('');
  }
  resultsDiv.classList.remove('hidden');
}

function pilihDariPencarian(idx, nama) {
  const select = document.getElementById('in_pilih_template');
  if (select) select.value = idx;
  document.getElementById('search_results_list').classList.add('hidden');
  pilihTemplateDinamis(idx);
}

function pilihTemplateDinamis(idx) {
  const searchBox = document.getElementById('search_template');
  const inSid = document.getElementById('in_serial_id');
  if (inSid) {
    inSid.value = ""; // Pastikan ID dikosongkan agar generate ID baru untuk instance surat ini
    shortUrlCache = "";
    lastSidForShortening = "";
  }

  if (idx === "" || !window.cacheTemplates || !window.cacheTemplates[idx]) {
    if(document.getElementById('in_nomor')) document.getElementById('in_nomor').value = "";
    if(document.getElementById('in_perihal')) document.getElementById('in_perihal').value = "";
    if(document.getElementById('in_penerima')) document.getElementById('in_penerima').value = "";
    if(document.getElementById('in_lampiran')) document.getElementById('in_lampiran').value = "-";
    if(document.getElementById('in_pembuka')) document.getElementById('in_pembuka').value = "";
      setIsiEditorValue(t.isi || "");
  if(document.getElementById('in_tembusan')) document.getElementById('in_tembusan').value = t.tembusan || "";

  // Selalu gunakan tanggal hari ini (lokal) meskipun memuat template
  const inputTgl = document.getElementById('in_tanggal');
  if (inputTgl) {
    const now = new Date();
    inputTgl.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
  }

  if (searchBox) searchBox.value = "";
  shortUrlCache = "";
  lastSidForShortening = "";
  if (typeof updateLivePreview === "function") updateLivePreview();
  return;
}


  const t = window.cacheTemplates[idx];
  if (searchBox) searchBox.value = t.nama;
  
  if(document.getElementById('in_perihal')) document.getElementById('in_perihal').value = t.perihal || "";
  if(document.getElementById('in_penerima')) document.getElementById('in_penerima').value = t.penerima || "";
  if(document.getElementById('in_lampiran')) document.getElementById('in_lampiran').value = t.lampiran || "-";
  if(document.getElementById('in_pembuka')) document.getElementById('in_pembuka').value = t.pembuka || "";
  if(document.getElementById('in_layout_type')) document.getElementById('in_layout_type').value = t.layout || "standard";
  setIsiEditorValue(t.isi || "");
  if(document.getElementById('in_tembusan')) document.getElementById('in_tembusan').value = t.tembusan || "";

  // Set tanggal ke hari ini (mengabaikan tanggal default di template agar otomatis terbaru)
  const inputTgl = document.getElementById('in_tanggal');
  if (inputTgl) {
    const now = new Date();
    inputTgl.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
  }

  // Otomatis perbarui nomor surat ke urutan terbaru berdasarkan klasifikasi template
  const parts = (t.nomor || "").split('/');
  if (parts.length > 0 && parts[0]) {
    const selectKlas = document.getElementById('in_kode_klasifikasi');
    if (selectKlas) {
      selectKlas.value = parts[0];
      mintaNomorOtomatis();
    }
  }

  shortUrlCache = "";
  lastSidForShortening = "";
  if (typeof updateLivePreview === "function") updateLivePreview();
  
  tampilkanToast("success", "TEMPLATE DIMUAT", `Draft '${t.nama}' berhasil diterapkan ke form.`);

  // Deteksi Tipe Template (Siswa vs Guru)
  const keywordSiswa = ["siswa", "skl", "pip", "ijazah", "lulus", "raport", "nilai"];
  const keywordGuru = ["guru", "tugas", "pbm", "sk pbm", "pembagian tugas"];
  const butuhSiswa = keywordSiswa.some(k => t.nama.toLowerCase().includes(k) || (t.isi && t.isi.toLowerCase().includes(k)));
  const butuhGuru = keywordGuru.some(k => t.nama.toLowerCase().includes(k) || (t.isi && t.isi.toLowerCase().includes(k)));
  
  const sectionSiswa = document.getElementById('section-pilih-siswa');

  if (sectionSiswa) {
    if (butuhSiswa) {
      sectionSiswa.classList.remove('hidden');
    } else {
      sectionSiswa.classList.add('hidden');
      window.selectedSiswa = null;
    }
  }
  const sectionGuru = document.getElementById('section-pilih-guru');
  if (sectionGuru) {
    if (butuhGuru) sectionGuru.classList.remove('hidden');
    else {
      sectionGuru.classList.add('hidden');
      window.selectedGuru = null;
    }
  }
}

function filterSiswa(query) {
  const resultsDiv = document.getElementById('siswa_results_list');
  if (!resultsDiv) return;
  if (!query || query.length < 3) {
    resultsDiv.innerHTML = "";
    resultsDiv.classList.add('hidden');
    return;
  }

  google.script.run.withSuccessHandler(function(data) {
    if (!data || data.length === 0) {
      resultsDiv.innerHTML = '<div class="p-3 text-[10px] text-slate-400 text-center italic">Siswa tidak ditemukan...</div>';
    } else {
      resultsDiv.innerHTML = data.map(s => {
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(s))));
        return `
          <div onclick="pilihSiswa('${encoded}')" 
               class="p-3 text-xs hover:bg-emerald-50 cursor-pointer flex items-center justify-between group transition-colors">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600 font-bold text-[10px]">
                ${s.Nama.charAt(0)}
              </div>
              <div class="flex flex-col overflow-hidden">
                <span class="font-bold text-slate-700 truncate uppercase">${s.Nama}</span>
                <span class="text-[9px] text-slate-400">NISN: ${s.NISN} | Kelas: ${s.Kelas}</span>
              </div>
            </div>
            ${window.isBatchMode ? '<i class="fa fa-plus-circle text-emerald-400"></i>' : ''}
          </div>`;
      }).join('');
    }
    resultsDiv.classList.remove('hidden');
  }).cariSiswa(query);
}

function pilihSiswa(encodedData) {
  try {
    const data = JSON.parse(decodeURIComponent(escape(atob(encodedData))));
    
    if (window.isBatchMode) {
      // Cek apakah sudah ada dalam list
      if (!window.selectedSiswaList.some(s => s.NISN === data.NISN)) {
        window.selectedSiswaList.push(data);
        tampilkanToast("success", "DITAMBAHKAN", `${data.Nama} masuk dalam antrean cetak.`);
      }
      const searchInp = document.getElementById('search_siswa');
      if (searchInp) {
        searchInp.value = "";
        searchInp.focus();
      }
      renderSelectedSiswaList();
    } else {
      window.selectedSiswa = data;
      document.getElementById('search_siswa').value = data.Nama;
      document.getElementById('siswa-selected-badge')?.classList.remove('hidden');
      tampilkanToast("success", "SISWA TERPILIH", `${data.Nama} terkoneksi.`);
    }

    document.getElementById('siswa_results_list').classList.add('hidden');
    updateLivePreview();
  } catch (e) {
    tampilkanToast("error", "GAGAL", "Gagal memproses data siswa.");
  }
}

function toggleBatchMode(val) {
  window.isBatchMode = val;
  window.selectedSiswaList = [];
  window.selectedSiswa = null;
  document.getElementById('siswa_selected_list').classList.toggle('hidden', !val);
  document.getElementById('siswa_selected_list').innerHTML = "";
  document.getElementById('search_siswa').value = "";
  updateLivePreview();
}

function renderSelectedSiswaList() {
  const container = document.getElementById('siswa_selected_list');
  container.innerHTML = window.selectedSiswaList.map((s, i) => `
    <div class="flex items-center gap-1.5 px-2 py-1 bg-emerald-600 text-white text-[9px] font-bold rounded-lg animate-in zoom-in duration-200">
      <span class="max-w-[80px] truncate uppercase">${s.Nama}</span>
      <button onclick="hapusSiswaDariBatch(${i})" class="hover:text-red-200"><i class="fa fa-times-circle"></i></button>
    </div>
  `).join('');
}

function hapusSiswaDariBatch(index) {
  window.selectedSiswaList.splice(index, 1);
  renderSelectedSiswaList();
  updateLivePreview();
}

function renderDaftarArsip(data) {
  const box = document.getElementById('kontainer-arsip');
  if(!box) return;
  
  if(!data || data.length === 0) {
    box.innerHTML = '<div class="text-center text-xs text-slate-400 py-5">Arsip tidak ditemukan atau masih kosong.</div>';
    return;
  }

  let htmlArsip = '';
  data.forEach((row, i) => {
    let teksPenerima = row.penerima ? String(row.penerima).replace(/\n/g, " ") : "-";
    let teksPerihal = row.perihal ? String(row.perihal) : "(Tanpa Perihal)";
    let tglSuratResmi = row.tanggal ? row.tanggal.split('T')[0] : "-";

    htmlArsip += `
    <div class="bg-white dark:bg-slate-800 p-2.5 rounded-xl border border-slate-200 dark:border-slate-700 hover:border-brand-blue transition-all cursor-default group relative">
      <div class="flex items-center justify-between mb-1">
        <span class="text-[9px] font-mono font-bold text-brand-blue bg-blue-50 px-1.5 py-0.5 rounded truncate max-w-[180px]">${row.nomor}</span>
        <span class="text-[9px] text-slate-400 font-medium">${tglSuratResmi}</span>
      </div>
      <div class="text-[11px] font-bold text-slate-700 truncate pr-8 mb-0.5">${teksPerihal}</div>
      <div class="text-[10px] text-slate-400 truncate italic">Kpd: ${teksPenerima}</div>
      
      <button onclick="konfirmasiHapusArsip('${row.id}', '${row.nomor.replace(/'/g, "\\'")}')" 
        class="absolute right-10 bottom-2 w-7 h-7 flex items-center justify-center bg-red-500 text-white rounded-lg shadow-md opacity-0 group-hover:opacity-100 transform translate-y-1 group-hover:translate-y-0 transition-all duration-200"
        title="Hapus Arsip">
        <i class="fa fa-trash text-[10px]"></i>
      </button>

      <button onclick="cetakUlangArsip('${btoa(unescape(encodeURIComponent(JSON.stringify(row))))}')" 
        class="absolute right-2 bottom-2 w-7 h-7 flex items-center justify-center bg-brand-blue text-white rounded-lg shadow-md opacity-0 group-hover:opacity-100 transform translate-y-1 group-hover:translate-y-0 transition-all duration-200"
        title="Gunakan Data Ini">
        <i class="fa fa-file-import text-[10px]"></i>
      </button>
    </div>`;
  });
  box.innerHTML = htmlArsip;
}

function filterArsip(query) {
  if (!window.cacheArsip) return;
  const q = query.toLowerCase().trim();
  if (q === "") {
    renderDaftarArsip(window.cacheArsip);
    return;
  }

  const filtered = window.cacheArsip.filter(row => 
    (row.nomor && row.nomor.toLowerCase().includes(q)) ||
    (row.perihal && row.perihal.toLowerCase().includes(q)) ||
    (row.penerima && row.penerima.toLowerCase().includes(q))
  );
  renderDaftarArsip(filtered);
}

/**
 * Fitur: Ekspor Log Arsip ke Excel (Buku Agenda)
 */
function eksporArsipExcel() {
  Swal.fire({
    title: 'Cetak Agenda Surat',
    text: 'Masukkan tahun arsip yang ingin diekspor ke Excel:',
    input: 'number',
    inputValue: new Date().getFullYear(),
    showCancelButton: true,
    confirmButtonText: 'Unduh Excel',
    cancelButtonText: 'Batal',
    confirmButtonColor: '#10b981',
    inputValidator: (value) => {
      if (!value) return 'Tahun wajib diisi!'
    }
  }).then((result) => {
    if (result.isConfirmed) {
      const tahun = result.value;
      setLoading(true, "Menyusun Buku Agenda " + tahun + "...");
      
      google.script.run
        .withSuccessHandler(function(data) {
          setLoading(false);
          if (!data || data.length === 0) {
            tampilkanToast("warning", "DATA KOSONG", `Tidak ada rekaman surat pada tahun ${tahun}.`);
            return;
          }
          
          // Ambil Identitas Sekolah dari Sidebar untuk Header Excel
          const namaSekolah = document.getElementById('in_kop_sekolah')?.value || "SDN MOJOGEMI 02";
          const daerah = document.getElementById('in_kop_daerah')?.value || "";
          const subDinas = document.getElementById('in_kop_sub')?.value || "";
          const alamatSekolah = document.getElementById('in_kop_alamat')?.value || "";
          const kontakSekolah = document.getElementById('in_kop_kontak')?.value || "";

          // 1. Buat Header ala Kop Surat
          const headerAoA = [
            ["", daerah.toUpperCase(), ""],
            ["", subDinas.toUpperCase(), ""],
            ["[LOGO KIRI]", namaSekolah.toUpperCase(), "[LOGO KANAN]"],
            ["", "BUKU AGENDA SURAT KELUAR TAHUN " + tahun, ""],
            ["", alamatSekolah + " | " + kontakSekolah, ""],
            [""], // Baris Kosong
          ];

          // 2. Buat Worksheet mulai dari header
          const ws = XLSX.utils.aoa_to_sheet(headerAoA);

          // 3. Tambahkan data tabel di bawah header (Mulai dari baris ke-7)
          XLSX.utils.sheet_add_json(ws, data, { origin: "A7" });

          // 4. Pengaturan lebar kolom dasar
          ws['!cols'] = [
            { wch: 22 }, { wch: 28 }, { wch: 35 }, { wch: 20 }, { wch: 25 }, { wch: 25 }, { wch: 25 }
          ];


          // 5. Build Workbook dan Unduh
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, ws, "Agenda_" + tahun);
          XLSX.writeFile(wb, `Buku_Agenda_Surat_Keluar_${tahun}.xlsx`);

          tampilkanToast("success", "EKSPOR BERHASIL", "File Excel siap dicetak.");
        })
        .withFailureHandler(err => { setLoading(false); tampilkanToast("error", "ERROR", err.toString()); })
        .ambilDataArsipUntukEkspor(tahun);
    }
  });
}

function konfirmasiHapusArsip(id, nomor) {
  Swal.fire({
    title: 'Hapus Arsip?',
    text: `Surat nomor ${nomor} akan dihapus permanen dari database log.`,

function cetakUlangArsip(encodedData) {
  try {
    const row = JSON.parse(decodeURIComponent(escape(atob(encodedData))));
    
    // SINKRONISASI TOTAL: Menambahkan elemen lampiran, pembuka, dan tanggal yang sempat tertinggal
    if(document.getElementById('in_nomor')) document.getElementById('in_nomor').value = row.nomor || "";
    if(document.getElementById('in_perihal')) document.getElementById('in_perihal').value = row.perihal || "";
    if(document.getElementById('in_penerima')) document.getElementById('in_penerima').value = row.penerima || "";
    if(document.getElementById('in_lampiran')) document.getElementById('in_lampiran').value = row.lampiran || "-";
    if(document.getElementById('in_pembuka')) document.getElementById('in_pembuka').value = row.pembuka || "";
    if(document.getElementById('in_layout_type')) document.getElementById('in_layout_type').value = row.layout || "standard";
    setIsiEditorValue(row.isi || "");
    if(document.getElementById('in_tembusan')) document.getElementById('in_tembusan').value = row.tembusan || "";
    
    // Pulihkan Serial ID dari arsip agar QR Code tetap sama dengan dokumen asli untuk verifikasi
    const inSid = document.getElementById('in_serial_id');
    if (inSid) {
      inSid.value = (row.sid && row.sid !== "N/A") ? row.sid : "";
      shortUrlCache = ""; 
      lastSidForShortening = "";
    }

    const inputTgl = document.getElementById('in_tanggal');
    if (inputTgl && row.tanggal) {
      inputTgl.value = String(row.tanggal).includes('T') ? row.tanggal.split('T')[0] : row.tanggal;
    }

    shortUrlCache = "";
    lastSidForShortening = "";
    switchTab('isi');
    if (typeof updateLivePreview === "function") updateLivePreview();

    // TRIGGER OTOMATIS: Munculkan panel Guru atau Siswa berdasarkan isi arsip
    const kwSiswa = ["siswa", "skl", "pip", "ijazah", "lulus", "raport", "nilai"];
    const kwGuru = ["guru", "tugas", "pbm", "sk pbm", "pembagian tugas"];
    const subjek = (row.perihal || "") + (row.isi || "");
    const isSiswa = kwSiswa.some(k => subjek.toLowerCase().includes(k));
    const isGuru = kwGuru.some(k => subjek.toLowerCase().includes(k));

    if (document.getElementById('section-pilih-siswa')) document.getElementById('section-pilih-siswa').classList.toggle('hidden', !isSiswa);
    if (document.getElementById('section-pilih-guru')) document.getElementById('section-pilih-guru').classList.toggle('hidden', !isGuru);

    // AUTO-LOAD DATA SISWA/GURU DARI REF_ID
    if (row.ref_id) {
      if (isSiswa) {
        google.script.run.withSuccessHandler(data => {
          if (data && data.length > 0) {
            window.selectedSiswa = data[0];
            if(document.getElementById('search_siswa')) document.getElementById('search_siswa').value = data[0].Nama;
            updateLivePreview();
          }
        }).cariSiswa(row.ref_id);
      } else if (isGuru) {
        google.script.run.withSuccessHandler(data => {
          if (data && data.length > 0) {
            window.selectedGuru = data[0];
            if(document.getElementById('search_guru')) document.getElementById('search_guru').value = data[0].Nama;
            updateLivePreview();
          }
        }).cariGuru(row.ref_id);
      }
    }

    tampilkanToast("success", "ARSIP DIMUAT", "Data riwayat surat berhasil ditarik ke form.");
  } catch (e) {
    tampilkanToast("error", "GAGAL MEMUAT", "Data arsip corrupt atau tidak valid.");
  }
}

/**
 * Fitur Tema: Dark Mode Toggle
 */
function toggleDarkMode() {
  const html = document.documentElement;
  const icon = document.getElementById('theme-icon');
  if (html.classList.contains('dark')) {
    html.classList.remove('dark');
    localStorage.setItem('kliksurat_theme_mode', 'light');
    icon.className = 'fa fa-moon';
  } else {
    html.classList.add('dark');
    localStorage.setItem('kliksurat_theme_mode', 'dark');
    icon.className = 'fa fa-sun';
  }
}

/**
 * Fitur Tema: Accent Color Switcher
 */
function changeAccentColor(color) {
  document.documentElement.style.setProperty('--brand-color', color);
  localStorage.setItem('kliksurat_accent_color', color);
  updateLivePreview();
  tampilkanToast("success", "TEMA BERUBAH", "Warna aksen aplikasi telah diperbarui.");
}

function applySavedTheme() {
  const savedMode = localStorage.getItem('kliksurat_theme_mode');
  const savedColor = localStorage.getItem('kliksurat_accent_color');
  const html = document.documentElement;
  const icon = document.getElementById('theme-icon');

  if (savedMode === 'dark') {
    html.classList.add('dark');
    if (icon) icon.className = 'fa fa-sun';
  } else {
    html.classList.remove('dark');
    if (icon) icon.className = 'fa fa-moon';
  }

  if (savedColor) {
    html.style.setProperty('--brand-color', savedColor);
  }
}

/**
 * Fungsi pengecekan duplikasi nomor secara manual ketika input kehilangan fokus
 */
function validasiNomorManual() {
  const el = document.getElementById('in_nomor');
  const nomor = el.value.trim();
  if (!nomor || nomor === "") {
    el.classList.remove('border-red-500', 'ring-red-200');
    return;
  }

  // Beri indikasi visual bahwa pengecekan sedang berlangsung
  el.classList.add('opacity-50');

  // Ekstraksi data untuk pengecekan lintas klasifikasi (Pattern: KODE/URUTAN/.../TAHUN)
  const parts = nomor.split('/');
  if (parts.length < 4) {
      // Fallback jika format tidak standar: cek string utuh
      google.script.run.withSuccessHandler(function(isDuplikat) {
          el.classList.remove('opacity-50');
          if (isDuplikat) {
              tampilkanToast("warning", "NOMOR TERSEDIA", "Nomor ini sudah ada, sedang menyesuaikan...");
              el.classList.add('border-red-500', 'ring-2', 'ring-red-200');
              mintaNomorOtomatis(); 
          }
      }).cekFullNomorDuplikat(nomor);
      return;
  }

  const urutan = parts[1];
  const tahun = parts[parts.length - 1];

  google.script.run
    .withSuccessHandler(function(status) {
      el.classList.remove('opacity-50');
      if (status === "DUPLICATE") {
        tampilkanToast("warning", "NOMOR DISESUAIKAN", `Nomor urut ${urutan} sudah digunakan. Menyesuaikan...`);
        el.classList.add('border-red-500', 'ring-2', 'ring-red-200');
        // KEMBALIKAN KE NOMOR TERAKHIR OTOMATIS
        mintaNomorOtomatis();
      } else if (status === "JUMP") {
        tampilkanToast("warning", "URUTAN DIPERBAIKI", `Nomor urut ${urutan} melompat. Mengembalikan ke urutan benar.`);
        el.classList.add('border-red-500', 'ring-2', 'ring-red-200');
        mintaNomorOtomatis();
      } else if (status === "VALID") {
        el.classList.remove('border-red-500', 'ring-2', 'ring-red-200');
        tampilkanToast("success", "NOMOR TERSEDIA", "Nomor ini unik dan dapat digunakan.");
      }
    })
    .withFailureHandler(function(err) {
      el.classList.remove('opacity-50');
      tampilkanToast("error", "KESALAHAN SERVER", "Gagal memvalidasi nomor. Periksa koneksi internet.");
      console.error("Duplicate Check Error:", err);
    })
    .cekNomorDuplikat(urutan, tahun);
}

function switchTab(target) {
  ['isi', 'redaksi', 'kop', 'ttd', 'arsip', 'masuk'].forEach(t => {
    const section = document.getElementById(`section-${t}`);
    const btn = document.getElementById(`btn-tab-${t}`);
    if (section) section.classList.add('hidden');
    if (btn) {
      // Gunakan classList agar tidak menghapus class 'hidden' yang sudah ada
      btn.classList.remove('border-brand-blue', 'text-brand-blue', 'bg-white');
      btn.classList.add('border-transparent', 'text-slate-500', 'hover:bg-slate-100');
    }
  });
  
  const targetSection = document.getElementById(`section-${target}`);
  const targetBtn = document.getElementById(`btn-tab-${target}`);
  if (targetSection) targetSection.classList.remove('hidden');
  if (targetBtn) {

    targetBtn.classList.remove('border-transparent', 'text-slate-500', 'hover:bg-slate-100');
    targetBtn.classList.add('border-brand-blue', 'text-brand-blue', 'bg-white');
  }
}

function tampilkanToast(tipe, judul, pesan) {
  const container = document.getElementById('toast-container');
  if(!container) return;

  let bColor, icon, bg;
  if (tipe === "success") {
    bColor = "border-emerald-500"; icon = "fa-circle-check text-emerald-600"; bg = "bg-emerald-50";
  } else if (tipe === "warning") {
    bColor = "border-amber-500"; icon = "fa-triangle-exclamation text-amber-600"; bg = "bg-amber-50";
  } else if (tipe === "info") {
    bColor = "border-blue-500"; icon = "fa-circle-info text-blue-600"; bg = "bg-blue-50";
  } else {
    bColor = "border-red-500"; icon = "fa-circle-xmark text-red-600"; bg = "bg-red-50";
  }

  playToastSound(tipe);
  const toast = document.createElement('div');
  toast.className = `pointer-events-auto flex items-start gap-3 p-4 rounded-2xl bg-white/95 backdrop-blur-md border shadow-xl translate-x-full transition-all duration-300 opacity-0 ${bColor}`;
  toast.innerHTML = `<div class="flex-shrink-0 w-8 h-8 rounded-xl ${bg} flex items-center justify-center"><i class="fa-solid ${icon}"></i></div><div class="flex-1"><h5 class="text-xs font-bold text-brand-navy uppercase tracking-wide">${judul}</h5><p class="text-xs text-slate-500 mt-0.5 leading-relaxed">${pesan}</p></div>`;
  container.appendChild(toast);
  setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10);
  setTimeout(() => { toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 7000);
}

/**
 * Fungsi untuk memainkan efek suara feedback (Web Audio API)
 */
function playToastSound(tipe) {
  try {
    const context = new (window.AudioContext || window.webkitAudioContext)();
    const osc = context.createOscillator();
    const gain = context.createGain();
    
    osc.connect(gain);
    gain.connect(context.destination);
    const now = context.currentTime;
    
    if (tipe === "success") {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, now); // Nada A5
      osc.frequency.exponentialRampToValueAtTime(1100, now + 0.1); // Naik ke C#6
    } else {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(440, now); // Nada A4
      osc.frequency.exponentialRampToValueAtTime(220, now + 0.2); // Turun pitch
    }
    
    gain.gain.setValueAtTime(0.05, now); // Volume pelan agar tidak mengagetkan
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
    
    osc.start(now);
    osc.stop(now + 0.4);
  } catch (e) { console.log("Audio feedback blocked or not supported"); }
}

function setLoading(show, text="") {
  const loader = document.getElementById('loading');
  const loaderText = document.getElementById('loading-text');
  if(!loader) return;

  if(show) {
    if(loaderText) loaderText.innerText = text || "Memproses...";
    loader.classList.remove('hidden');
    setTimeout(() => {
      loader.classList.replace('opacity-0', 'opacity-100');
    }, 10);
  } else {
    loader.classList.replace('opacity-100', 'opacity-0');
    setTimeout(() => {
      loader.classList.add('hidden');
    }, 300); // Sesuai dengan durasi transition-opacity duration-300
  }
}

/**
 * Refined Initialization Logic
 */
function initializeApp() {
  // Detect Verification Mode (QR Scan)
  if (globalParams && globalParams.mode === '1') {
    runVerificationMode(globalParams.id);
    return;
  }

  // Dashboard Initialization
  setupDashboardUI();
  initTinyMCEEditor();
  
  // Sesi dan Data
  if (typeof periksaSesiLoginOtomatis === "function") periksaSesiLoginOtomatis();
  
  // Muat database pendukung di latar belakang setelah UI siap
  setTimeout(() => {
    loadKoleksiDatabase();
    muatDataArsip();
    loadKodeKlasifikasiSurat();
    muatDraftAutosave();
    setInterval(jalankanAutosave, 30000); // Autosave setiap 30 detik
    
    // Sinkronisasi ulang pratinjau tepat setelah font browser dipastikan siap (Loaded)
        if (document.fonts) {
          document.fonts.ready.then(() => {
            if (typeof updateLivePreview === "function") updateLivePreview();
            if (typeof stabilkanLivePreviewSetelahLayout === "function") stabilkanLivePreviewSetelahLayout();
          });
        }
  }, 800);

  if (!webAppUrl || webAppUrl === "" || webAppUrl.includes('undefined')) {
    if (typeof google !== 'undefined') {
      google.script.run
        .withFailureHandler(err => console.warn("Failed to fetch Web App URL:", err))
        .withSuccessHandler(url => {
          if (url) { 
            webAppUrl = url.replace(/\/dev$/, "/exec"); 
          }
        }).dapatkanUrlSkrip();
    }
  }
}

/**
 * Logic for Verification Page
 */
function runVerificationMode(uid) {
  document.getElementById('login-page').classList.add('hidden');
  const vPage = document.getElementById('verification-page');
  const vCard = document.getElementById('v-card');
  
  vPage.classList.remove('hidden');
  setTimeout(() => {
    vPage.classList.replace('opacity-0', 'opacity-100');
    vCard.classList.replace('scale-95', 'scale-100');
  }, 100);

  document.getElementById('v-sid').innerText = uid || 'N/A';
  document.getElementById('v-no').innerText = "Memverifikasi...";
  document.getElementById('v-hal').innerText = "Mengambil data pangkalan...";
  document.getElementById('v-ttd').innerText = "Otoritas Sekolah";

  if (globalAppName) document.getElementById('v-footer-app-name').innerText = globalAppName;
  if (globalAppName) document.getElementById('v-desc').innerText = `Informasi diverifikasi otomatis oleh Sistem Arsip ${globalAppName}`;
  if (globalLogo) {
    document.getElementById('v-logo').src = globalLogo;
    document.getElementById('v-watermark').src = globalLogo;
  }

  setLoading(true, "Verifikasi Dokumen...");

  if (uid && typeof google !== 'undefined') {
    google.script.run
      .withFailureHandler(err => {
        console.error("Verification failed:", err);
        document.getElementById('v-hal').innerText = "Error Koneksi Server";
        document.getElementById('v-no').innerText = "NETWORK ERROR";
        setLoading(false);
      })
      .withSuccessHandler(function(res) {
        if (res.status === "SUCCESS") {
          document.getElementById('v-no').innerText = res.no;
          document.getElementById('v-hal').innerText = res.hal;
          document.getElementById('v-ttd').innerText = res.ttd;
        } else {
          document.getElementById('v-no').innerText = "TIDAK VALID";
          document.getElementById('v-hal').innerText = "Data Tidak Ditemukan";
          document.getElementById('v-desc').innerText = "Peringatan: Dokumen ini tidak terdaftar di database resmi.";
          document.getElementById('v-desc').className = "text-xs mb-8 italic leading-relaxed px-4 text-red-500 font-bold";
        }
        setLoading(false);
      }).verifikasiSuratByUid(uid);
  } else {
    setLoading(false);
  }
}

function bukaModalSiswa(tab = 'form') {
  const form = document.getElementById('form-siswa');
  form.reset();
  switchTabSiswa(tab);
  
  // Jika ada siswa yang sedang dipilih di sidebar, muat ke form untuk diedit
  if (window.selectedSiswa) {
    isiFormSiswa(window.selectedSiswa);
    document.getElementById('btn-hapus-siswa').classList.remove('hidden');
  } else {
    document.getElementById('btn-hapus-siswa').classList.add('hidden');
  }
  
  document.getElementById('modal-siswa').classList.remove('hidden');
}

function isiFormSiswa(data) {
    const form = document.getElementById('form-siswa');
    Object.keys(data).forEach(key => {
      const input = form.querySelector(`[name="${key}"]`);
      if (input) input.value = window.selectedSiswa[key];
    });
}

function simpanDataSiswa() {
  const form = document.getElementById('form-siswa');
  const formData = new FormData(form);
  const data = {};
  formData.forEach((value, key) => data[key] = value);

  if (!data.Nama || !data.NISN) {
    tampilkanToast("error", "DATA TIDAK LENGKAP", "Nama dan NISN wajib diisi!");
    return;
  }

  setLoading(true, "Menyimpan data siswa...");
  google.script.run.withSuccessHandler(function(res) {
    setLoading(false);
    if (res.status === "SUCCESS") {
      tampilkanToast("success", "BERHASIL", res.message);
      window.selectedSiswa = data; // Update cache lokal
      tutupModalSiswa();
      muatTabelSiswa();
      updateLivePreview();
    } else {
      tampilkanToast("error", "GAGAL", res.message);
    }
  }).simpanSiswaBaru(data);
}

function hapusDataSiswa(nisnManual, namaManual) {
  const nisn = nisnManual || document.querySelector('#form-siswa [name="NISN"]').value;
  const nama = namaManual || document.querySelector('#form-siswa [name="Nama"]').value;
  if (!nisn) {
    tampilkanToast("warning", "PILIH DATA", "Tidak ada data siswa yang dipilih untuk dihapus.");
    return;
  }

  Swal.fire({
    title: 'Hapus Siswa?',
    text: `Seluruh data identitas dan nilai ${nama} (${nisn}) akan dihapus secara permanen.`,
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#e11d48',
    confirmButtonText: 'Ya, Hapus Permanen',
    cancelButtonText: 'Batal'
  }).then((result) => {
    if (result.isConfirmed) {
      setLoading(true, "Menghapus...");
      google.script.run.withSuccessHandler(res => {
        setLoading(false);
        tampilkanToast(res.status === "SUCCESS" ? "success" : "error", "HAPUS", res.message);
        if (res.status === "SUCCESS") {
          window.selectedSiswa = null;
          if (!nisnManual) tutupModalSiswa();
          muatTabelSiswa();
          updateLivePreview();
        }
      }).hapusSiswa(nisn);
    }
  });
}

function muatTabelSiswa() {

  });

      <td class="p-3"><div class="h-4 w-20 bg-slate-100 animate-pulse rounded"></div></td>

  `).join('');
  
  google.script.run.withSuccessHandler(data => {
