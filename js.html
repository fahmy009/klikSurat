    window.fullCacheSiswa = data || [];
    renderTabelSiswa(window.fullCacheSiswa);
    updateHeaderStats();
  }).ambilSemuaSiswa();
}

function filterTabelSiswa() {
  const filters = {};
  document.querySelectorAll('#siswa-tab-table input[data-filter-col]').forEach(input => {
    const col = input.dataset.filterCol;
    const value = input.value.trim().toLowerCase();
    if (value) {
      filters[col] = value;
    }
  });

  let filteredData = window.fullCacheSiswa;

  if (Object.keys(filters).length > 0) {
    filteredData = window.fullCacheSiswa.filter(s => {
      let match = true;
      for (const col in filters) {
        const filterValue = filters[col];
        if (col === "Domisili") { // Special handling for combined address fields
          const domisiliText = `${s.Dusun || ''} ${s.Desa || ''} ${s.RT || ''} ${s.RW || ''} ${s.Kecamatan || ''} ${s.Kabupaten || ''}`.toLowerCase();
          if (!domisiliText.includes(filterValue)) match = false;
        } else {
          if (!String(s[col] || '').toLowerCase().includes(filterValue)) match = false;
        }
        if (!match) break;
      }
      return match;
    });
  }
  renderTabelSiswa(filteredData);
}

function renderTabelSiswa(data) {
  const container = document.getElementById('tabel-siswa-body');
  if (!data || data.length === 0) {
    container.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-400">Database masih kosong.</td></tr>';
    return;
  }
  container.innerHTML = data.map((s, i) => `
    <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
      <td class="p-3 text-xs font-bold text-slate-700">${s.Nama}</td>
      <td class="p-3 text-xs font-mono">${s.NISN}</td>
      <td class="p-3 text-xs">${s.Kelas || '-'}</td>
      <td class="p-3 text-[10px] text-slate-500 italic">${s.Dusun || '-'}, RT ${s.RT || 0}/RW ${s.RW || 0}</td>
      <td class="p-3 text-right space-x-2">
        <button onclick="editSiswaRow('${btoa(unescape(encodeURIComponent(JSON.stringify(s))))}')" class="text-brand-blue hover:text-sky-700"><i class="fa fa-edit"></i></button>
        <button onclick="hapusDataSiswa('${s.NISN}', '${s.Nama.replace(/'/g, "\\'")}')" class="text-rose-500 hover:text-rose-700"><i class="fa fa-trash"></i></button>
      </td>
    </tr>
  `).join('');
}

function editSiswaRow(encoded) {
  window.selectedSiswa = JSON.parse(decodeURIComponent(escape(atob(encoded))));
  bukaModalSiswa('form');
}

  setLoading(true, "Menyiapkan Data...");

    setLoading(false);
    if (!data || data.length === 0) {
      tampilkanToast("warning", "EKSPOR GAGAL", "Database siswa masih kosong.");
      return;
    }
    
    // Konversi array JSON ke Worksheet Excel menggunakan library XLSX

    tampilkanToast("success", "BERHASIL", "File Excel berhasil diunduh.");

}

function handleImporSiswaExcel(event) {
  const file = event.target.files[0];
  const reader = new FileReader();
  reader.onload = e => {
    const dataRaw = new Uint8Array(e.target.result);
    const workbook = XLSX.read(dataRaw, { type: 'array' });
    const firstSheet = workbook.SheetNames[0];
    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheet]);

    if (!jsonData || jsonData.length === 0) {
      tampilkanToast("error", "FILE KOSONG", "Tidak ada data dalam file Excel tersebut.");
      return;
    }

    setLoading(true, "Mengimpor...");
    google.script.run.withSuccessHandler(res => {
      setLoading(false);
      Swal.fire('Impor Selesai', res.message, 'success');
      event.target.value = "";
    }).imporSiswaBatch(jsonData);
  };
  reader.readAsArrayBuffer(file);
}

  try {
    const data = JSON.parse(decodeURIComponent(escape(atob(encodedData))));

    );
    if (!isExist) {
      window.selectedGuruList.push(data);
      tampilkanToast("success", "DITAMBAHKAN", `${data.Nama} masuk dalam antrean.`);

    const searchInp = document.getElementById('search_guru');

  document.getElementById('guru_results_list').classList.add('hidden');
  updateLivePreview();

}

function filterTabelGuru() {
  const filters = {};
  document.querySelectorAll('#guru-tab-table input[data-filter-col]').forEach(input => {
    const col = input.dataset.filterCol;
    const value = input.value.trim().toLowerCase();
    if (value) {
      filters[col] = value;
    }
  });

  let filteredData = window.fullCacheGuru;

  if (Object.keys(filters).length > 0) {
    filteredData = window.fullCacheGuru.filter(g => {
      let match = true;
      for (const col in filters) {
        const filterValue = filters[col];
        if (!String(g[col] || '').toLowerCase().includes(filterValue)) match = false;
        if (!match) break;
      }
      return match;
    });
  }
  renderTabelGuru(filteredData);
}

/**
 * Optimalisasi Mobile: Menyesuaikan skala pratinjau agar fit-to-screen
 */
function adjustPreviewScaleMobile() {
  if (window.innerWidth > 1024) {
    const area = document.getElementById('print-area');
    if (area) { area.style.transform = ''; area.style.margin = ''; }
    return;
  }

  const pane = document.getElementById('preview-pane');
  const area = document.getElementById('print-area');
  if (!pane || !area) return;

  const size = document.getElementById('in_ukuran_kertas')?.value || "size-a4";
  const paperWidthMm = size === 'size-f4' ? 215 : 210;
  const paperWidthPx = paperWidthMm * (96 / 25.4);
  const padding = 32; // Total padding px
  const availableWidth = pane.clientWidth - padding;
  const scale = Math.min(1, availableWidth / paperWidthPx);

  area.style.transform = `scale(${scale})`;
  area.style.transformOrigin = 'top center';
  // Beri margin negatif bawah agar scroll container tidak terlalu panjang karena scale
  area.style.marginBottom = `-${area.offsetHeight * (1 - scale)}px`;
}

  const asal = document.getElementById('in_masuk_asal').value;

    tampilkanToast("error", "BELUM LENGKAP", "Mohon isi metadata dan pilih file surat.");
    return;
  }

  setLoading(true, "Menganalisis Dokumen (OCR)...");
  
  const file = fileInput.files[0];
  const reader = new FileReader();
  
  reader.onload = function(e) {
    const base64Data = e.target.result.split(',')[1];
    const mimeType = file.type;
    
    const metadata = {
      asal_surat: asal,

    };

        tampilkanToast("success", "BERHASIL SCAN", res.message);
        
        // Tampilkan cuplikan hasil OCR di UI
        const resultBox = document.getElementById('ocr_result_box');

        if (resultBox && previewText) {
          resultBox.classList.remove('hidden');
          previewText.innerText = res.extracted;
        }
        
        // Reset Form
        document.getElementById('in_masuk_asal').value = "";
        document.getElementById('in_masuk_nomor').value = "";
        document.getElementById('in_masuk_perihal').value = "";
        fileInput.value = "";
        document.getElementById('label_file_masuk').innerText = "PILIH DOKUMEN (PDF/JPG)";
      } else {
        tampilkanToast("error", "GAGAL", res.message);
      }
    }).simpanSuratMasukOCR(metadata, base64Data, mimeType);
  };
  reader.readAsDataURL(file);
}

</script>
